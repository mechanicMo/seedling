name: seedling
description: Parent education and child learning platform
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.4.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Firebase
  firebase_core: ^3.6.0
  firebase_auth: ^5.3.1
  cloud_firestore: ^5.4.4
  firebase_messaging: ^15.1.3
  google_sign_in: ^6.2.1

  # Navigation
  go_router: ^14.2.7

  # State management
  flutter_riverpod: ^2.5.1

  # Cloud Functions
  cloud_functions: ^5.1.3

  # Content Rendering
  flutter_markdown: ^0.7.4
  intl: ^0.19.0

  # Audio Playback
  just_audio: ^0.9.40
  flutter_tts: ^4.2.0

  # URL launching
  url_launcher: ^6.3.0

  # Models
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  flutter_launcher_icons: ^0.14.3
  build_runner: ^2.4.13
  freezed: ^2.5.7
  json_serializable: ^6.8.0
  # riverpod_generator removed — pulls in riverpod_analyzer_utils -> custom_lint_core -> analyzer_plugin 0.12.0
  # which is broken with analyzer 7.x. Providers written manually using Riverpod 2.x Notifier/AsyncNotifier.
  # custom_lint/riverpod_lint also removed for same reason.

  # Testing
  fake_cloud_firestore: ^3.0.3
  firebase_auth_mocks: ^0.14.1
  mocktail: ^1.0.4

flutter:
  uses-material-design: true

  assets:
    - assets/characters/sparks/
    - assets/characters/clover/
    - assets/characters/zee/
    - assets/characters/zee/asl/
    - assets/characters/for landing page/
    - assets/audio/stories/activity-big-world-little-hands/
    - assets/audio/stories/activity-clover-counts-the-steps/
    - assets/audio/stories/activity-clover-s-morning/
    - assets/audio/stories/activity-sparks-and-the-end-of-park-time/
    - assets/audio/stories/activity-the-same-blue-truck/
    - assets/audio/stories/activity-zee-finds-all-the-colors/
    - assets/audio/stories/activity-zee-tries-something-new/
    - assets/audio/stories/activity-sparks-and-the-scary-storm/
    - assets/audio/stories/activity-clover-s-rainy-day/
    - assets/audio/stories/activity-zee-learns-to-ask-for-help/
    - assets/audio/stories/activity-zee-gets-lost/

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon/app_icon.png"
  adaptive_icon_foreground: "assets/icon/app_icon_foreground.png"
  adaptive_icon_background: "#F8F2D4"
